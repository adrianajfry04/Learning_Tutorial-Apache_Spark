services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: censo
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: censo_escolar
      POSTGRES_MULTIPLE_DATABASES: "censo_escolar,metabase"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U censo -d censo_escolar"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: censo
      MB_DB_PASS: "123"
      MB_DB_HOST: postgres

volumes:
  postgres_data: